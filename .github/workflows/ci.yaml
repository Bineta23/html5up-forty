name: CI/CD Pipeline with Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write          # nécessaire pour peaceiris/actions-gh-pages
  security-events: write   # pour uploader le rapport Trivy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # optionnel : utilise Node.js 24

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static files
        run: |
          mkdir -p build
          cp -r * build/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: ./build

  scan-trivy:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: scan-trivy
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: ./build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build